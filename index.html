<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دعوة محمد ولين</title>
    <style>
        body { margin: 0; padding: 0; background: #fdfaf7; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://amazing-swan-123456.netlify.app/1000147876.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }
        .container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; }
        .top-box { background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); padding: 25px; border-radius: 20px; width: 85%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .names { font-size: 2.2rem; color: #444; margin: 0; }
        .countdown { display: flex; justify-content: space-around; margin-top: 20px; }
        .time-box { display: flex; flex-direction: column; font-weight: bold; color: #8a7b6a; }
        .time-box span { font-size: 0.7rem; color: #bba; }
        .actions { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .btn { padding: 16px; border-radius: 50px; border: none; font-weight: bold; text-decoration: none; text-align: center; font-size: 1rem; }
        .accept { background: #8a7b6a; color: white; box-shadow: 0 8px 20px rgba(138,123,106,0.3); }
        .decline { background: white; color: #8a7b6a; border: 1px solid #8a7b6a; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="top-box">
            <h1 class="names">Mohammed & Lynn</h1>
            <p style="color: #999; margin: 5px 0;">20 . 03 . 2026</p>
            <div class="countdown">
                <div class="time-box"><div id="d">0</div><span>يوم</span></div>
                <div class="time-box"><div id="h">0</div><span>ساعة</span></div>
                <div class="time-box"><div id="m">0</div><span>دقيقة</span></div>
            </div>
        </div>
        <div class="actions">
            <a href="https://wa.me/966000000000?text=أتشرف بالحضور" class="btn accept">✅ يشرفني الحضور</a>
            <a href="https://wa.me/966000000000?text=أعتذر عن الحضور" class="btn decline">❌ أعتذر عن الحضور</a>
        </div>
    </div>
    <script>
        const target = new Date("March 20, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("d").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("h").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("m").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
        }, 1000);
    </script>
</body>
</html>
